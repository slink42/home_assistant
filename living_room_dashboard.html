<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Living Room — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,400;12..96,600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --bg2: #13161e;
    --bg3: #1a1e2a;
    --border: rgba(255,255,255,0.07);
    --border-hi: rgba(255,255,255,0.14);
    --text: #e8eaf0;
    --muted: #6b7080;
    --amber: #f0a020;
    --amber-dim: rgba(240,160,32,0.15);
    --teal: #2dd4bf;
    --teal-dim: rgba(45,212,191,0.12);
    --blue: #60a0f0;
    --blue-dim: rgba(96,160,240,0.12);
    --green: #4ade80;
    --green-dim: rgba(74,222,128,0.12);
    --font-display: 'Bricolage Grotesque', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-display);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .page {
    position: relative;
    z-index: 1;
    max-width: 1280px;
    margin: 0 auto;
    padding: 24px 24px 48px;
  }

  header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }

  .header-left h1 {
    font-size: 28px;
    font-weight: 600;
    letter-spacing: -0.5px;
    line-height: 1;
  }

  .header-left h1 span {
    color: var(--teal);
  }

  .header-left .sub {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  
  .section-divider {
    font-family: var(--font-mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    margin: 20px 0 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .grid {
    display: grid;
    gap: 16px;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  }

  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    position: relative;
    overflow: hidden;
    transition: all 0.2s;
    cursor: pointer;
  }

  .card:hover {
    border-color: var(--border-hi);
    transform: translateY(-2px);
    background: var(--bg3);
  }
  
  .card.is-off {
      background: var(--bg);
  }
  
  .card.is-off .card-name, .card.is-off .card-state {
      color: var(--muted);
  }
  
  .card.is-off:hover {
      background: var(--bg2);
  }

  .card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
  }
  
  .card-icon {
      font-size: 20px;
      line-height: 1;
      color: var(--amber);
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--amber-dim);
  }
  
  .card.is-off .card-icon {
      color: var(--muted);
      background: transparent;
      border: 1px solid var(--border);
  }

  .card-info {
      line-height: 1.3;
  }

  .card-name {
      font-weight: 600;
      font-size: 14px;
  }
  
  .card-state {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
  }

  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--bg3);
    border: 1px solid var(--amber);
    border-radius: 8px;
    padding: 12px 18px;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--amber);
    z-index: 999;
    transform: translateY(60px);
    opacity: 0;
    transition: all 0.3s ease;
  }

  .toast.show { transform: translateY(0); opacity: 1; }
</style>
</head>
<body>
<div class="page">

  <header>
    <div class="header-left">
      <h1>Living Room <span>Lights</span></h1>
      <div class="sub" id="clock">Wednesday 18 March 2026 &nbsp;·&nbsp; Melbourne, AU</div>
       <div class="sub" style="margin-top:3px">
        <span id="haStatus" style="color:var(--muted)">connecting…</span>
        &nbsp;·&nbsp;
        <a href="#" onclick="localStorage.removeItem('ha_lights_token');location.reload();return false;"
           style="color:var(--muted);text-decoration:none" onmouseover="this.style.color='var(--amber)'" onmouseout="this.style.color='var(--muted)'">reset token</a>
      </div>
    </div>
  </header>

  <div class="section-divider">Scenes</div>
  <div class="grid" id="scenes-grid">
    <!-- Scenes will be injected here -->
  </div>

  <div class="section-divider">Lamps</div>
  <div class="grid" id="lamps-grid">
    <!-- Lamps will be injected here -->
  </div>
  
  <div class="section-divider">Ceiling & Other Lights</div>
  <div class="grid" id="other-lights-grid">
      <!-- Other lights will be injected here -->
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const HA_URL   = (() => {
  const o = window.location.origin;
  if (o.includes('8123') || o.includes('homeassistant') || o.includes('slink42')) return o;
  return 'http://homeassistant.local:8123';
})();
const HA_TOKEN = localStorage.getItem('ha_lights_token') || '';

const ENTITIES = {
    scenes: [
        'scene.lounge_evening',
        'scene.lounge_ceiling_globes_0_dim',
        'scene.lounge_ceiling_globes_1_dim_1',
        'scene.lounge_ceiling_globes_2_dim_2',
    ],
    lamps: [
        'light.talllamp',
        'light.192_168_104_43',
    ],
    other: [
        'light.lounge_ceiling_globes',
        'light.light_switch_lounge',
        'light.home_assistant_voice_0a44f6_led_ring',
    ]
};

const ICONS = {
    'scene.lounge_evening': '🛋️',
    'scene.lounge_ceiling_globes_0_dim': '🎬',
    'scene.lounge_ceiling_globes_1_dim_1': '🎵',
    'scene.lounge_ceiling_globes_2_dim_2': '💡',
    'light.talllamp': '💡',
    'light.192_168_104_43': '💡',
    'light.lounge_ceiling_globes': '💡',
    'light.light_switch_lounge': '💡',
    'light.home_assistant_voice_0a44f6_led_ring': '🤖',
};

// ── TOKEN PROMPT ──
(function checkToken() {
  if (!HA_TOKEN) {
    const overlay = document.createElement('div');
    overlay.style.cssText = `position:fixed;inset:0;background:rgba(13,15,20,0.97);display:flex;flex-direction:column;
      align-items:center;justify-content:center;z-index:9999;gap:16px;font-family:'DM Mono',monospace;`;
    overlay.innerHTML = `
      <div style="color:#f0a020;font-size:16px;font-weight:500">Home Assistant token required</div>
      <div style="color:#6b7080;font-size:11px;max-width:340px;text-align:center;line-height:1.6">
        Go to your HA Profile → Security → Long-Lived Access Tokens → Create Token
      </div>
      <input id="tokenInput" type="password" placeholder="Paste token here…"
        style="background:#1a1e2a;border:1px solid rgba(255,255,255,0.14);border-radius:8px;
               color:#e8eaf0;padding:10px 14px;font-family:'DM Mono',monospace;font-size:12px;
               width:340px;outline:none;" />
      <button onclick="saveToken()" style="background:#f0a020;color:#0d0f14;border:none;border-radius:8px;
        padding:10px 24px;font-family:'DM Mono',monospace;font-size:12px;font-weight:500;cursor:pointer;">
        Connect
      </button>`;
    document.body.appendChild(overlay);
    window._tokenOverlay = overlay;
  }
})();

window.saveToken = function() {
  const val = document.getElementById('tokenInput').value.trim();
  if (!val) return;
  localStorage.setItem('ha_lights_token', val);
  window._tokenOverlay.remove();
  location.reload();
};

// ── HA API HELPERS ──
async function haCall(service, data) {
  const [domain, svc] = service.split('.');
  try {
    const r = await fetch(`${HA_URL}/api/services/${domain}/${svc}`, {
      method: 'POST',
      headers: { Authorization: `Bearer ${HA_TOKEN}`, 'Content-Type': 'application/json' },
      body: JSON.stringify(data),
    });
    if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
    return true;
  } catch(e) {
    showToast(`⚠ HA error: ${e.message}`);
    return false;
  }
}

async function haGetStates(entityIds) {
    if (!HA_TOKEN) return {};
    try {
        const response = await fetch(`${HA_URL}/api/states`, {
            headers: { Authorization: `Bearer ${HA_TOKEN}` },
        });
        if (!response.ok) throw new Error('Failed to fetch states');
        const allStates = await response.json();
        const stateMap = {};
        allStates.filter(s => entityIds.includes(s.entity_id)).forEach(s => stateMap[s.entity_id] = s);
        return stateMap;
    } catch (e) {
        return {};
    }
}

// ── CLOCK & TOAST ──
function updateClock() {
  const now = new Date();
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('clock').textContent =
    `${days[now.getDay()]} ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()} · ${now.toLocaleTimeString('en-AU')}`;
}
updateClock();
setInterval(updateClock, 1000);

function showToast(msg, color) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.borderColor = color || 'var(--amber)';
  t.style.color = color || 'var(--amber)';
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 3000);
}

// ── UI RENDERING & INTERACTION ──
function renderCard(entity) {
    const icon = ICONS[entity.entity_id] || '❓';
    const isScene = entity.entity_id.startsWith('scene.');
    const stateText = isScene ? 'Activate' : (entity.state === 'on' ? 'On' : 'Off');

    return `
        <div class="card ${entity.state === 'off' ? 'is-off' : ''}" id="card-${entity.entity_id}" onclick="${isScene ? 'activateScene' : 'toggleLight'}('${entity.entity_id}')">
            <div class="card-header">
                <div class="card-icon">${icon}</div>
                <div class="card-info">
                    <div class="card-name">${entity.attributes.friendly_name || entity.entity_id}</div>
                    <div class="card-state">${stateText}</div>
                </div>
            </div>
        </div>
    `;
}

function updateCard(entity) {
    const card = document.getElementById(`card-${entity.entity_id}`);
    if (!card) return;
    
    const stateText = entity.entity_id.startsWith('scene.') ? 'Activate' : (entity.state === 'on' ? 'On' : 'Off');
    card.querySelector('.card-state').textContent = stateText;
    
    if (entity.state === 'on') {
        card.classList.remove('is-off');
    } else {
        card.classList.add('is-off');
    }
}

window.toggleLight = async (entityId) => {
    showToast(`Toggling ${entityId}...`);
    const ok = await haCall('light.toggle', { entity_id: entityId });
    if(ok) {
        setTimeout(loadLiveState, 500); // Refresh state after a short delay
    }
};

window.activateScene = async (entityId) => {
    showToast(`Activating ${entityId}...`);
    const ok = await haCall('scene.turn_on', { entity_id: entityId });
};


async function loadLiveState() {
  if (!HA_TOKEN) return;
  const allEntityIds = [...ENTITIES.scenes, ...ENTITIES.lamps, ...ENTITIES.other];
  const states = await haGetStates(allEntityIds);
  
  ['scenes', 'lamps', 'other'].forEach(group => {
      const grid = document.getElementById(`${group}-grid`);
      grid.innerHTML = '';
      ENTITIES[group].forEach(id => {
          const entityState = states[id];
          if(entityState) {
              grid.innerHTML += renderCard(entityState);
          }
      });
  });
  
  document.getElementById('haStatus').textContent = '● Connected';
  document.getElementById('haStatus').style.color = 'var(--green)';
}

// Initial Load
if (HA_TOKEN) {
    loadLiveState();
    setInterval(loadLiveState, 30000); // Refresh every 30 seconds
}

</script>
</body>
</html>
